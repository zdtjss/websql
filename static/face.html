<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=yes" />
    <title>人脸识别</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        input {
            margin: 3px 5px;
        }

        #result {
            font-size: 18px;
            margin: 20px 5px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div>
        <input type="button" value="识别校验" onclick="getTokenPC()" />
        <input id="imgFile" type="file" name="imgfile" accept="image/png,image/gif,image/jpeg,image/jpg"
            @change="uploadImg">
        <div id="result"></div>
    </div>

    <script>

        const host = "https://10.10.2.196"
        const api_key = "XXXXX";
        const api_secret = "XXXXXXXX"

        const http = axios.create({
            baseURL: host,
            timeout: 30 * 1000
        });

        if (location.search.indexOf("back=1") !== -1) {
            getTResultPC()
        }

        function getTokenPC() {

            let getTokenParam = {
                api_key: api_key,
                api_secret: api_secret,
                return_url: host + "/static?back=1",
                notify_url: host + "/api/receiveNotify",
                biz_no: "1010101w",
                comparison_type: "0",
                uuid: "UUUUUUIIIIIIDDDD",
                return_biz_id: 1,
                image_ref1: document.getElementById("imgFile").files[0]
            }

            // 获取token
            http.post("/faceid/liveness/v2/get_token", getTokenParam, {
                headers: { 'Content-Type': 'multipart/form-data' }
            }).then(function (response) {
                console.log(response)
                sessionStorage.setItem("biz_id", response.data.biz_id)
                location.href = "https://api.megvii.com/faceid/liveness/v2/do?token=" + response.data.token
            }).catch(function (error) {
                console.log(error);
            });
        }


        function getTResultPC() {

            const biz_id = sessionStorage.getItem("biz_id")
            let params = "api_key=" + api_secret + "&api_secret=" + api_secret + "&biz_id=" + biz_id

            // 获取token
            http.get("/faceid/liveness/v2/get_result?" + params)
                .then(function (resp) {
                    const result = resp.data.verify_result
                    if (result !== null && result.result_ref1.confidence >= result.result_ref1.thresholds["1e-4"]) {
                        document.getElementById("result").innerHTML = "校验通过"
                    } else {
                        document.getElementById("result").innerHTML = "校验不通过"
                    }
                }).catch(function (error) {
                    console.log(error);
                });
        }

        function uploadImg(e) {
            let file = e.target.files[0];
            let param = new FormData();
            if (!this.checkType(file.type)) {
                window.alert('上传的图片必须是图片类型！');
                return;
            }
            if (file.size > MAX_SIZE) {
                window.alert('上传的图片尺寸不能超过2M！');
                return;
            }
            // param.append（‘表单字段名’, 字段对应的内容） 提交图片和文章id
            param.append('imgfile', file);
            param.append('id', ID);

        }
    </script>
</body>
