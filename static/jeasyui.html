<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Basic CRUD Application - jQuery EasyUI CRUD Demo</title>
    <link rel="stylesheet" type="text/css" href="/js/easyui/themes/default/easyui.css">
    <link rel="stylesheet" type="text/css" href="/js/easyui/themes/icon.css">
    <link rel="stylesheet" type="text/css" href="/js/easyui/demo/demo.css">
    <script type="text/javascript" src="/js/easyui/jquery.min.js"></script>
    <script type="text/javascript" src="/js/easyui/jquery.easyui.min.js"></script>
</head>

<body>
    <h2>Format DataGrid Columns</h2>
    <p>The list price value will show red color when less than 30.</p>
    <div style="margin:20px 0;"></div>
    <table class="easyui-datagrid" title="Format DataGrid Columns" style="width:100%;max-height:500px"
        data-options="rownumbers:true,fitColumns:true,singleSelect:true,iconCls:'icon-ok',url:'/sqlite',method:'get'">
        <thead>
            <tr>
                <th data-options="field:'uid',width:80">Item ID</th>
                <th data-options="field:'username',width:100">Product</th>
                <th data-options="field:'uepartment',width:80,align:'right'">List Price</th>
                <th data-options="field:'created',width:80,align:'right',formatter:formatDate">Unit Cost</th>
            </tr>
        </thead>
    </table>
    <script>
        function formatDate(val, row) {
            return new Date(val).toLocaleDateString();
        }
    </script>
</body>

</html>
