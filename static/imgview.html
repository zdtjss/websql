<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=yes" />
    <title>图片预览</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.1/viewer.min.js"
        integrity="sha512-UzpQxIWgLbHvbVd4+8fcRWqFLi1pQ6qO6yXm+Hiig76VhnhW/gvfvnacdPanleB2ak+VwiI5BUqrPovGDPsKWQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.1/viewer.min.css"
        integrity="sha512-XHhuZDcgyu28Fsd75blrhZKbqqWCXaUCOuy2McB4doeSDu34BgydakOK71TH/QEhr0nhiieBNhF8yWS8thOGUg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <!-- a block container is required -->
    <div>
        <!-- <img id="image" width="100%" src="pic.jpg" alt="Picture"> -->
        <span onclick="view()">查看</span>
    </div>

    <div>
        <div id="caseName"></div>
        <div id="images" style="display: flex;overflow-y: auto;">
            <span><img style="max-height: 100px;" src="pic.jpg" alt="Picture 1"></span>
        </div>
    </div>

    <script>

        const $ = (key) => {
            if (key.startsWith("#")) {
                return document.getElementById(key.substr(1))
            } else if (key.startsWith(".")) {
                return document.getElementsByClassName(key.substr(1))
            } else {
                return document.querySelector(key)
            }
        }

        const data = {
            caseId: "20221111", caseName: "随便", details: [
                { pic: "pic.jpg" }
            ]
        }

        $("#caseName").innerText = data.caseName
        let html = ""
        for (let i = 0; i < data.details.length; i++) {
            html += `<span><img style="max-height: 100px;" src="${data.details[i].pic}"></span>`
        }
        $("#images").innerHTML = html

        const images = $('#images')
        const gallery = new Viewer(images);

    </script>
</body>

</html>
