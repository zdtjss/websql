<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WEB-SQL</title>
    <script>
      // 尽早应用主题，避免暗色模式下的白屏闪烁
      (function () {
        try {
          if (localStorage.getItem('websql_theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; }
      html[data-theme="dark"] body { background-color: #1e1e1e; }
      html:not([data-theme="dark"]) body { background-color: #ffffff; }
      #boot-splash {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 14px;
        font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
        background: #ffffff; color: #909399;
        z-index: 9999;
      }
      html[data-theme="dark"] #boot-splash { background: #1e1e1e; color: #808080; }
      #boot-splash .boot-logo {
        width: 40px; height: 40px;
        border-radius: 10px;
        background: linear-gradient(135deg, #409eff, #007acc);
        animation: boot-pulse 1.4s ease-in-out infinite;
      }
      #boot-splash .boot-text { font-size: 13px; letter-spacing: 0.5px; }
      @keyframes boot-pulse {
        0%, 100% { transform: scale(1); opacity: 0.9; }
        50% { transform: scale(0.82); opacity: 0.5; }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash">
      <div class="boot-logo"></div>
      <div class="boot-text">WebSQL 加载中…</div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
